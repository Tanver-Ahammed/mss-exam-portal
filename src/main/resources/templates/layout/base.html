<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">MSS Exam Portal</title>
    <link rel="stylesheet" th:href="${viteCss}"/>

    <style>
        /* Mobile sidebar toggle */
        #sidebar-toggle:checked ~ #sidebar {
            transform: translateX(0);
        }

        #sidebar-toggle:checked ~ #sidebar-backdrop {
            display: block;
        }

        #sidebar {
            transition: transform 0.25s cubic-bezier(.4, 0, .2, 1);
        }

        /* Sidebar active link */
        .sidebar-link.active {
            background: #4f46e5;
            color: #ffffff !important;
        }

        .sidebar-link.active svg {
            color: #ffffff !important;
        }

        .sidebar-link.active:hover {
            background: #4338ca;
        }

        /* Sidebar scrollbar */
        .sidebar-scroll::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar-scroll::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar-scroll::-webkit-scrollbar-thumb {
            background: #e5e7eb;
            border-radius: 4px;
        }

        .nav-root {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        .nav-dropdown {
            z-index: 9999;
        }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

<input type="checkbox" id="sidebar-toggle" class="hidden"/>

<!-- Navbar -->
<div th:replace="~{fragments/navbar :: navbar}"></div>

<!-- Sidebar backdrop (mobile) -->
<label for="sidebar-toggle" id="sidebar-backdrop"
       class="fixed inset-0 bg-gray-900/40 backdrop-blur-[1px] z-30 lg:hidden hidden cursor-pointer"></label>

<!-- Sidebar -->
<div th:replace="~{fragments/sidebar :: sidebar}"></div>

<!-- Main content -->
<div class="lg:ml-56 pt-14">
    <div class="sticky top-14 z-20 bg-white border-b border-gray-200 px-6 py-3">
        <h1 class="text-sm font-semibold text-gray-800" th:text="${pageTitle}">Dashboard Overview</h1>
    </div>
    <div class="p-6">
        <th:block th:replace="${content}"></th:block>
    </div>
</div>

<!-- jQuery first, then navbar toggle logic — order guaranteed here -->
<script type="module" th:src="${viteJs}"></script>
<script>
    jQuery(document).ready(function ($) {

        $('[data-toggle="langMenu"]').on('click', function (e) {
            e.stopPropagation();
            $('#avatarMenu').addClass('hidden');
            $('#langMenu').toggleClass('hidden');
        });

        $('[data-toggle="avatarMenu"]').on('click', function (e) {
            e.stopPropagation();
            $('#langMenu').addClass('hidden');
            $('#avatarMenu').toggleClass('hidden');
        });

        $('#langMenu, #avatarMenu').on('click', function (e) {
            e.stopPropagation();
        });

        $(document).on('click', function () {
            $('#langMenu').addClass('hidden');
            $('#avatarMenu').addClass('hidden');
        });

    });
</script>

</body>
</html>
