<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::styles}, ~{::main}, ~{::scripts})}">
<head>
  <title th:text="${pageTitle} + ' — MyApp'">Home — MyApp</title>

  <!--
    No extra styles — main.css is sufficient for this page.
  -->
  <th:block th:fragment="styles"></th:block>
</head>
<body>

  <main th:fragment="main">
    <div class="max-w-2xl">
      <div class="card">
        <h2 class="text-xl font-bold text-gray-900 mb-2">Welcome</h2>
        <p class="text-gray-600 mb-6">
          This page loads only
          <code class="bg-sky-50 text-sky-700 px-1.5 py-0.5 rounded text-xs">main.css</code>
          and
          <code class="bg-sky-50 text-sky-700 px-1.5 py-0.5 rounded text-xs">main.js</code>.
          No DataTables or Cropper assets loaded here.
        </p>
        <div class="flex gap-3">
          <a th:href="@{/users}" class="btn-primary">View Users Table</a>
          <a th:href="@{/profile}" class="btn-secondary">Edit Profile</a>
        </div>
      </div>
    </div>
  </main>

  <!--
    No extra scripts — main.js (jQuery 4) is sufficient for this page.
  -->
  <th:block th:fragment="scripts"></th:block>

</body>
</html>
