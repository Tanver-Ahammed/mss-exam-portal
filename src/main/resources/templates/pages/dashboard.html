<!--/* Example page using the layout fragment
     Controller must add to model:
       - activeUrl  (e.g. request.requestURI)
*/-->
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{})}">

<title th:fragment="title">Dashboard — Exam Portal</title>

<main th:fragment="content">
    <div class="container-fluid">

        <!-- Page heading -->
        <div class="mb-4">
            <h1 class="fs-4 fw-bold" style="color: var(--text-primary)">
                Dashboard
            </h1>
            <p class="mt-1 small" style="color: var(--text-secondary)"
               th:text="#{page.dashboard.subtitle}">
                Welcome back. Here's what's happening today.
            </p>
        </div>

        <!-- Stat cards -->
        <div class="row g-3">

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="stat-card p-4" style="
                        background: var(--surface-raised);
                        border: 1px solid var(--surface-border);">
                    <p class="text-uppercase small fw-semibold mb-1"
                       style="color: var(--text-muted)">Total Users</p>
                    <p class="fs-3 fw-bold" style="color: var(--accent-light)">—</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="stat-card p-4" style="
                        background: var(--surface-raised);
                        border: 1px solid var(--surface-border);">
                    <p class="text-uppercase small fw-semibold mb-1"
                       style="color: var(--text-muted)">Active Courses</p>
                    <p class="fs-3 fw-bold" style="color: var(--accent-light)">—</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="stat-card p-4" style="
                        background: var(--surface-raised);
                        border: 1px solid var(--surface-border);">
                    <p class="text-uppercase small fw-semibold mb-1"
                       style="color: var(--text-muted)">Exams Today</p>
                    <p class="fs-3 fw-bold" style="color: var(--accent-light)">—</p>
                </div>
            </div>

            <div class="col-12 col-sm-6 col-lg-3">
                <div class="stat-card p-4" style="
                        background: var(--surface-raised);
                        border: 1px solid var(--surface-border);">
                    <p class="text-uppercase small fw-semibold mb-1"
                       style="color: var(--text-muted)">Enrollments</p>
                    <p class="fs-3 fw-bold" style="color: var(--accent-light)">—</p>
                </div>
            </div>

        </div>
    </div>
</main>

</html>
