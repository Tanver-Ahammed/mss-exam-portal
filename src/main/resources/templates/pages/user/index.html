<!--/* Pass 3 fragments: title, content, pageScripts */-->
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{::#page-scripts})}">

<head>
    <title th:fragment="title" th:text="#{page.user.title} + ' — ' + #{app.name}">Users — Exam Portal</title>
</head>

<main th:fragment="content">

    <!-- ── Page content ──────────────────────────────────────────────────────── -->
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="#{page.user.title}">Users</h1>
            <p class="page-subtitle" th:text="#{page.user.subtitle}">Manage system users and their roles</p>
        </div>
        <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            <span th:text="#{page.user.add}">Add User</span>
        </button>
    </div>

    <!-- ── Filter Section ─────────────────────────────────────────────────────── -->
    <div class="card mb-4">
        <div class="card-body">
            <form id="filterForm" class="row g-3">

                <div th:replace="~{fragments/geo-filter :: geoFilter}"></div>

                <div class="col-sm-4 col-lg-3">
                    <div class="form-floating mt-4">
                        <button type="submit" class="btn btn-primary w-100 h-100">
                            <i class="fa-solid fa-search"></i>
                            <span th:text="#{common.submit}">Submit</span>
                        </button>
                    </div>
                </div>
                <div class="col-sm-4 col-lg-3">
                    <div class="form-floating mt-4">
                        <button type="button" id="resetFilter" class="btn btn-secondary w-100 h-100">
                            <i class="fa-solid fa-rotate-left"></i>
                            <span th:text="#{common.reset}">Reset</span>
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table id="usersTable" class="table"></table>
    </div>

</main>

<!-- ── Page-specific scripts ──────────────────────────────────────────────────
     Passed as 3rd argument to layout. Rendered at the bottom of <body>
     AFTER jQuery + DataTables + all global libs are loaded.
────────────────────────────────────────────────────────────────────────────── -->
<th:block id="page-scripts">
    <script th:inline="javascript">
        lang = /*[[${lang}]]*/ 'en';
        usersApi = /*[[${T(com.mss.exam.portal.Routes).API_USER}]]*/ '/api/user';
    </script>
    <script th:src="@{/js/geo.js}"></script>
    <script th:src="@{/js/user/index.js}"></script>
</th:block>

</html>
