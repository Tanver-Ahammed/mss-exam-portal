<!--/* Pass 3 fragments: title, content, pageScripts */-->
<html th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{::#page-scripts})}">

<head>
    <title th:fragment="title" th:text="#{page.user.title} + ' — ' + #{app.name}">Users — Exam Portal</title>
</head>

<main th:fragment="content">

    <!-- ── Page content ──────────────────────────────────────────────────────── -->
    <div class="page-header">
        <div>
            <h1 class="page-title" th:text="#{page.user.title}">Users</h1>
            <p class="page-subtitle" th:text="#{page.user.subtitle}">Manage system users and their roles</p>
        </div>
        <button class="btn btn-primary">
            <i class="fa-solid fa-plus"></i>
            <span th:text="#{page.user.add}">Add User</span>
        </button>
    </div>

    <!-- ── Filter Section ─────────────────────────────────────────────────────── -->
    <div class="card mb-4">
        <div class="card-body">
            <form id="filterForm" class="row g-3">
                <div class="col-md-3">
                    <label for="omniSearch" class="form-label">Search</label>
                    <input type="text" class="form-control" id="omniSearch" name="omniSearch"
                           placeholder="Name, email, phone...">
                </div>
                <div class="col-md-2">
                    <label for="divisionId" class="form-label">Division</label>
                    <select class="form-select" id="divisionId" name="divisionId">
                        <option value="">All Divisions</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="districtId" class="form-label">District</label>
                    <select class="form-select" id="districtId" name="districtId">
                        <option value="">All Districts</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="upazilaId" class="form-label">Upazila</label>
                    <select class="form-select" id="upazilaId" name="upazilaId">
                        <option value="">All Upazilas</option>
                    </select>
                </div>
                <div class="col-md-2">
                    <label for="status" class="form-label">Status</label>
                    <select class="form-select" id="status" name="status">
                        <option value="">All Status</option>
                        <option value="PENDING">Pending</option>
                        <option value="ACTIVE">Active</option>
                        <option value="INACTIVE">Inactive</option>
                        <option value="SUSPENDED">Suspended</option>
                    </select>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="submit" class="btn btn-primary w-100">
                        <i class="fa-solid fa-search"></i>
                    </button>
                </div>
                <div class="col-md-1 d-flex align-items-end">
                    <button type="button" id="resetFilter" class="btn btn-secondary w-100">
                        <i class="fa-solid fa-rotate-left"></i>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <div class="table-responsive">
        <table id="usersTable" class="table"></table>
    </div>

</main>

<!-- ── Page-specific scripts ──────────────────────────────────────────────────
     Passed as 3rd argument to layout. Rendered at the bottom of <body>
     AFTER jQuery + DataTables + all global libs are loaded.
────────────────────────────────────────────────────────────────────────────── -->
<th:block id="page-scripts">
    <script th:inline="javascript">
        lang = /*[[${lang}]]*/ 'en';
        usersApi = /*[[${T(com.mss.exam.portal.Routes).API_USER}]]*/ '/api/user';
    </script>
    <script th:src="@{/js/user/index.js}"></script>
</th:block>

</html>
