<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/base :: layout(~{::title}, ~{::styles}, ~{::main}, ~{::scripts})}">
<head>
  <title th:text="${pageTitle} + ' — MyApp'">Profile — MyApp</title>

  <!--
    cropper.css — injected into <head> by base layout
    Contains: Cropper.js base CSS + overrides
  -->
  <th:block th:fragment="styles">
    <link rel="stylesheet" th:href="@{/css/cropper.css}"/>
  </th:block>
</head>
<body>

  <main th:fragment="main">
    <div class="max-w-2xl space-y-6">
      <div class="card">
        <h2 class="text-xl font-bold text-gray-900 mb-6">Edit Profile</h2>

        <form th:action="@{/profile}" method="post" enctype="multipart/form-data">

          <!-- Avatar crop section -->
          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-2">Profile Photo</label>

            <!--
              data-cropper       → triggers Cropper init in cropper.js
              data-aspect-ratio  → 1 = square crop
            -->
            <img data-cropper
                 data-aspect-ratio="1"
                 th:src="@{/images/placeholder-avatar.png}"
                 alt="Avatar"
                 class="max-w-xs rounded-lg border border-gray-200"/>

            <!-- Receives cropped blob written by cropper.js on confirm -->
            <input type="file" id="avatarInput" name="avatar" class="hidden"/>

            <div class="mt-3 flex gap-2">
              <button type="button" data-crop-target="#avatarInput" class="btn-primary">
                Confirm Crop
              </button>
              <button type="button" class="btn-secondary">Reset</button>
            </div>
          </div>

          <!-- Name fields -->
          <div class="grid grid-cols-2 gap-4 mb-4">
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">First name</label>
              <input type="text" name="firstName" value="Alice"
                     class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                            focus:outline-none focus:ring-2 focus:ring-sky-500"/>
            </div>
            <div>
              <label class="block text-sm font-medium text-gray-700 mb-1">Last name</label>
              <input type="text" name="lastName" value="Smith"
                     class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                            focus:outline-none focus:ring-2 focus:ring-sky-500"/>
            </div>
          </div>

          <div class="mb-6">
            <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
            <input type="email" name="email" value="alice@example.com"
                   class="w-full rounded-lg border border-gray-300 px-3 py-2 text-sm
                          focus:outline-none focus:ring-2 focus:ring-sky-500"/>
          </div>

          <button type="submit" class="btn-primary">Save Changes</button>
        </form>
      </div>
    </div>
  </main>

  <!--
    cropper.js — injected before </body> by base layout
    jQuery 4 (window.$) already available from main.js
  -->
  <th:block th:fragment="scripts">
    <script th:src="@{/js/cropper.js}" defer></script>
  </th:block>

</body>
</html>
