<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!--/*
    MAIN LAYOUT FRAGMENT
    Usage:

        <html th:replace="~{fragments/layout :: layout(~{::title}, ~{::main}, ~{::script})}">
            <title>Page Title</title>
            <main>...page body...</main>
            <script th:fragment="script" th:src="@{/js/my-page.js}"></script>
        </html>

    Page-specific CSS  → place inside <main> normally (rendered in <head> position is fine for late CSS).
    Page-specific JS   → place as <script th:fragment="script" th:src="@{/js/my-page.js}"></script>
                          OUTSIDE <main> so layout can hoist it AFTER all global scripts (jQuery is ready).
*/-->

<th:block th:fragment="layout(title, content, pageScripts)">
    <!DOCTYPE html>
    <html xmlns:th="http://www.thymeleaf.org" th:lang="${#locale.language}">
    <head>
        <meta charset="UTF-8"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <link rel="icon"
              href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>"/>

        <title th:replace="${title}">Exam Portal</title>

        <!-- 1) Bootstrap CSS -->
        <link rel="stylesheet"
              href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
              integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
              crossorigin="anonymous"/>

        <!-- 2) Font Awesome -->
        <link rel="stylesheet"
              href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"/>

        <!-- 3) DataTables (Bootstrap 5 theme) -->
        <link rel="stylesheet"
              href="https://cdn.datatables.net/2.3.7/css/dataTables.bootstrap5.min.css"/>

        <!-- 4) App CSS -->
        <link rel="stylesheet" th:href="@{/css/layout.css}"/>
    </head>

    <body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div th:replace="~{fragments/sidebar :: sidebar}"></div>

    <div id="mainWrapper" class="main-wrapper">
        <main class="page-content">
            <div th:replace="${content}"></div>
        </main>
        <footer class="main-footer">
            &copy;
            <span th:text="${#temporals.year(#temporals.createNow())}">2025</span>
            <span th:text="#{app.name}">Exam Portal</span>
            &mdash;
            <span th:text="#{app.footer.rights}">All rights reserved.</span>
        </footer>
    </div>

    <!-- ============================================================
         GLOBAL SCRIPTS — load order matters:
         jQuery → DataTables → Bootstrap → App → Page-specific
         ============================================================ -->

    <!-- 1) jQuery (must be first — DataTables depends on it) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
            integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo="
            crossorigin="anonymous"></script>

    <!-- 2) DataTables core + Bootstrap 5 integration -->
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.min.js"></script>
    <script src="https://cdn.datatables.net/2.3.7/js/dataTables.bootstrap5.min.js"></script>

    <!-- 3) Bootstrap JS (bundle includes Popper) -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
            crossorigin="anonymous"></script>

    <!-- 4) App layout JS -->
    <script th:src="@{/js/layout.js}"></script>

    <!-- 5) Page-specific scripts slot -->
    <th:block th:replace="${pageScripts}"></th:block>

    </body>
    </html>
</th:block>

</html>
