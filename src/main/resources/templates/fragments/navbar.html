<style>
    .group:hover .group-hover\:text-gray-900 {
        color: #111827;
    }

    .relative:hover .group-hover\:block,
    .relative:focus-within .group-hover\:block {
        display: block;
    }
</style>

<nav class="bg-white shadow-sm border-b border-gray-200 fixed w-full top-0 z-50"
     xmlns:th="http://www.thymeleaf.org"
     th:fragment="navbar">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between h-16">
            <div class="flex items-center">
                <label for="sidebar-toggle" class="mr-4 text-gray-500 hover:text-gray-700 lg:hidden cursor-pointer">
                    <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M4 6h16M4 12h16M4 18h16"/>
                    </svg>
                </label>
                <a th:href="@{/}" class="flex items-center">
                    <svg class="h-8 w-8 text-indigo-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                    <span class="ml-2 text-xl font-bold text-gray-900" th:text="#{app.name}">MSS Exam Portal</span>
                </a>
            </div>
            <div class="flex items-center">
                <div class="relative inline-block text-left mr-4">
                    <div class="relative group">
                        <button type="button"
                                class="inline-flex justify-center items-center px-3 py-2 border border-gray-300 shadow-sm text-sm font-medium rounded-md text-gray-700 bg-white hover:bg-gray-50 focus:outline-none cursor-pointer">
                            <svg class="h-4 w-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                            </svg>
                            <span th:text="${#locale.language == 'bn' ? 'বাংলা' : 'English'}">English</span>
                            <svg class="-mr-1 ml-1 h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                      d="M19 9l-7 7-7-7"/>
                            </svg>
                        </button>
                        <div class="hidden group-hover:block group-focus-within:block absolute right-0 mt-2 w-32 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none z-50">
                            <div class="py-1">
                                <a th:href="@{''(lang=en)}"
                                   class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">English</a>
                                <a th:href="@{''(lang=bn)}"
                                   class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">বাংলা</a>
                            </div>
                        </div>
                    </div>
                </div>
                <a href="#" class="text-gray-500 hover:text-gray-700 px-3 py-2 rounded-md text-sm font-medium"
                   th:text="#{nav.sign.in}">Sign In</a>
                <a href="#"
                   class="ml-3 bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-md text-sm font-medium"
                   th:text="#{nav.get.started}">Get Started</a>
            </div>
        </div>
    </div>
</nav>
