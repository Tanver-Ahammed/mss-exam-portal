<nav class="nav-root bg-white border-b border-gray-200 fixed w-full top-0 h-14"
     style="z-index: 50;"
     xmlns:th="http://www.thymeleaf.org"
     th:fragment="navbar">

    <!-- style must be inside the fragment element so Thymeleaf includes it -->
    <style>
        .nav-root {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
        }

        .nav-dropdown {
            z-index: 9999;
        }
    </style>

    <div class="flex items-center justify-between h-full px-4 sm:px-5">

        <!-- Left: hamburger + logo -->
        <div class="flex items-center gap-3">
            <label for="sidebar-toggle"
                   class="p-1.5 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 lg:hidden cursor-pointer transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
                </svg>
            </label>
            <a th:href="@{/}" class="flex items-center gap-2 select-none">
                <div class="h-8 w-8 rounded-lg bg-indigo-600 flex items-center justify-center shadow-sm flex-shrink-0">
                    <svg class="h-4 w-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"/>
                    </svg>
                </div>
                <span class="text-[15px] font-semibold text-gray-900 tracking-tight"
                      th:text="#{app.name}">MSS Portal</span>
            </a>
        </div>

        <!-- Right: lang · bell · avatar -->
        <div class="flex items-center gap-2">

            <!-- ① Language switcher -->
            <div class="relative inline-block text-left">
                <button type="button" data-toggle="langMenu"
                        class="inline-flex justify-center items-center gap-1.5 px-2.5 py-1.5 rounded-lg border border-gray-200 text-xs font-medium text-gray-600 bg-white hover:bg-gray-50 transition-colors">
                    <svg class="h-3.5 w-3.5 text-gray-500" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round"
                              d="M3 5h12M9 3v2m1.048 9.5A18.022 18.022 0 016.412 9m6.088 9h7M11 21l5-10 5 10M12.751 5C11.783 10.77 8.07 15.61 3 18.129"/>
                    </svg>
                    <span th:text="${#locale.language == 'bn' ? 'বাংলা' : 'EN'}">EN</span>
                    <svg class="h-3 w-3 text-gray-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                         stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div id="langMenu"
                     class="nav-dropdown hidden origin-top-right absolute right-0 mt-2 w-32 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none">
                    <div class="py-1">
                        <a th:href="@{''(lang=en)}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">English</a>
                        <a th:href="@{''(lang=bn)}" class="block px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">বাংলা</a>
                    </div>
                </div>
            </div>

            <!-- ② Notification bell -->
            <button type="button"
                    class="relative p-1.5 rounded-lg text-gray-500 hover:text-gray-700 hover:bg-gray-100 transition-colors">
                <svg class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round"
                          d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
                </svg>
                <span class="absolute top-1 right-1 h-2 w-2 rounded-full bg-red-500 ring-2 ring-white"></span>
            </button>

            <!-- ③ Avatar -->
            <div class="relative inline-block text-left">
                <button type="button" data-toggle="avatarMenu"
                        class="flex items-center gap-1.5 pl-1 pr-2 py-1 rounded-lg hover:bg-gray-100 transition-colors">
                    <div class="h-7 w-7 rounded-full bg-gradient-to-br from-indigo-400 to-indigo-600 flex items-center justify-center text-white text-xs font-semibold ring-2 ring-white shadow-sm flex-shrink-0">
                        A
                    </div>
                    <svg class="h-3.5 w-3.5 text-gray-400 hidden sm:block" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
                    </svg>
                </button>
                <div id="avatarMenu"
                     class="nav-dropdown hidden origin-top-right absolute right-0 mt-2 w-48 rounded-md shadow-lg bg-white ring-1 ring-black ring-opacity-5 focus:outline-none">
                    <div class="py-1">
                        <div class="px-4 py-2 border-b border-gray-100">
                            <p class="text-xs font-semibold text-gray-800">Admin User</p>
                            <p class="text-xs text-gray-500">admin@mss.edu</p>
                        </div>
                        <a href="#" class="flex items-center gap-2 px-4 py-2 text-sm text-gray-700 hover:bg-gray-100">
                            <svg class="h-4 w-4 text-gray-400 flex-shrink-0" fill="none" viewBox="0 0 24 24"
                                 stroke="currentColor" stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
                            </svg>
                            Profile
                        </a>
                        <a th:href="@{/logout}"
                           class="flex items-center gap-2 px-4 py-2 text-sm text-red-600 hover:bg-red-50 border-t border-gray-100">
                            <svg class="h-4 w-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"
                                 stroke-width="2">
                                <path stroke-linecap="round" stroke-linejoin="round"
                                      d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                            </svg>
                            Sign Out
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- script must be inside the fragment element so Thymeleaf includes it.
         jQuery is guaranteed available because base.html loads it before </body> -->
    <script>
        jQuery(document).ready(function ($) {

            $('[data-toggle="langMenu"]').on('click', function (e) {
                e.stopPropagation();
                $('#avatarMenu').addClass('hidden');
                $('#langMenu').toggleClass('hidden');
            });

            $('[data-toggle="avatarMenu"]').on('click', function (e) {
                e.stopPropagation();
                $('#langMenu').addClass('hidden');
                $('#avatarMenu').toggleClass('hidden');
            });

            // Keep menus open when clicking inside them
            $('#langMenu, #avatarMenu').on('click', function (e) {
                e.stopPropagation();
            });

            // Close when clicking anywhere outside
            $(document).on('click', function () {
                $('#langMenu').addClass('hidden');
                $('#avatarMenu').addClass('hidden');
            });

        });
    </script>

</nav>
